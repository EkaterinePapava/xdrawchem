# build-rpm.yml — builds .rpm packages for RHEL/Fedora family
# Uses container jobs to get the correct build environment.
# Produces packages for:
#   - Fedora 40 (current stable)
#   - Rocky Linux 9 / AlmaLinux 9  (RHEL 9 compatible)
#   - Rocky Linux 8 / AlmaLinux 8  (RHEL 8 compatible, needs EPEL)

name: Build RPM packages

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: RPM (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fedora-40
            image: fedora:40
            pre: |
              dnf install -y rpm-build rpmdevtools cmake ninja-build gcc-c++ \
                qt6-qtbase-devel qt6-qttools-devel \
                openbabel-devel \
                desktop-file-utils libGL-devel libEGL-devel \
                pkgconfig
            epel: ""

          - name: rocky-9
            image: rockylinux:9
            pre: |
              dnf install -y epel-release dnf-plugins-core
              dnf config-manager --set-enabled crb
              dnf install -y rpm-build rpmdevtools cmake ninja-build gcc-c++ \
                qt6-qtbase-devel qt6-qttools-devel \
                openbabel-devel \
                desktop-file-utils libGL-devel libEGL-devel \
                pkgconfig
            epel: "epel"

          - name: rocky-8
            image: rockylinux:8
            pre: |
              dnf install -y epel-release dnf-plugins-core
              dnf config-manager --set-enabled powertools
              dnf install -y rpm-build rpmdevtools cmake ninja-build gcc-c++ \
                qt6-qtbase-devel qt6-qttools-devel \
                openbabel-devel \
                desktop-file-utils libGL-devel libEGL-devel \
                pkgconfig
            epel: "epel"

    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: ${{ matrix.pre }}

      - name: Set up rpmbuild tree
        run: |
          rpmdev-setuptree
          # Create source tarball from the xdrawchem-qt5 subtree
          # The spec expects xdrawchem-2.0rc1/xdrawchem-qt5 structure inside the tarball
          VERSION=$(grep "^Version:" xdrawchem-qt5/SPECS/xdrawchem.spec | awk '{print $2}')
          RELEASE_TAG=$(grep "^Release:" xdrawchem-qt5/SPECS/xdrawchem.spec | awk '{print $2}' | sed 's/%{?dist}//')
          echo "Building version: ${VERSION}-${RELEASE_TAG}"
          
          # Pack as xdrawchem-2.0rc1.tar.gz containing the xdrawchem-qt5 content
          # The spec's %autosetup uses -n %{name}-%{version}rc1/xdrawchem-qt5
          mkdir -p /tmp/xdrawchem-2.0rc1
          cp -r xdrawchem-qt5/. /tmp/xdrawchem-2.0rc1/xdrawchem-qt5/
          tar -czf ~/rpmbuild/SOURCES/xdrawchem-2.0rc1.tar.gz \
            -C /tmp xdrawchem-2.0rc1/

      - name: Copy spec file
        run: |
          cp xdrawchem-qt5/SPECS/xdrawchem.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/xdrawchem.spec \
            --define "dist .$(echo ${{ matrix.name }} | tr '-' '_')" \
            -j$(nproc)

      - name: List produced packages
        run: |
          find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name "*.rpm" | while read f; do
            echo "=== $f ==="
            rpm -qip "$f" | grep -E "^Name|^Version|^Release|^Architecture|^Size"
          done

      - name: Collect RPMs
        run: |
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name "*.rpm" -exec cp {} rpms/ \;
          ls -lh rpms/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xdrawchem-rpm-${{ matrix.name }}
          path: rpms/*.rpm
          retention-days: 30

      - name: Upload for release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-rpm-${{ matrix.name }}
          path: rpms/*.rpm
          retention-days: 1
